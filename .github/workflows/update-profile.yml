name: Update profile assets

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone stellar-profile generator
        run: git clone --depth 1 https://github.com/nalkaslassy/stellar-profile.git /tmp/stellar

      - name: Install dependencies
        run: pip install -r /tmp/stellar/requirements.txt

      - name: Write config from secret
        env:
          STELLAR_CONFIG: ${{ secrets.STELLAR_CONFIG }}
        run: echo "$STELLAR_CONFIG" > /tmp/stellar/config.yml

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/stellar
          python -m generator.main

      - name: Copy SVGs to profile repo
        run: |
          mkdir -p assets/generated
          cp /tmp/stellar/assets/generated/*.svg assets/generated/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/
          git diff --staged --quiet || git commit -m "chore: update profile assets [skip ci]"
          git push
